<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f1115;
  color: white;
  padding: 20px;
}

.card {
  background: #1a1d23;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
}

h1 { color: #b5f03c; }

button {
  padding: 10px 20px;
  background: #b5f03c;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Dashboard</h1>

<button onclick="loadAll()">Atualizar</button>

<div class="card">
  <h2>💸 Gasto</h2>
  <div id="spent">R$ 0,00</div>
</div>

<div class="card">
  <h2>🛒 Receita</h2>
  <div id="revenue">-</div>
</div>

<div class="card">
  <h2>📦 Pedidos</h2>
  <div id="orders">-</div>
</div>

<div class="card">
  <h2>💰 Lucro</h2>
  <div id="profit">-</div>
</div>

<div class="card">
  <h2>🎯 ROAS</h2>
  <div id="roas">-</div>
</div>

<script>

// CONFIG
const SHEET_ID = '1MQoxtYfNbOhF9A2TaqKHC4f-ZiEeMs_8Ob-xOd-lYMQ';

// ===== YAMPI (PLANILHA)
async function fetchYampi() {

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  const res = await fetch(url);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1)
  );

  const rows = json.table.rows || [];

  let orders = [];

  rows.forEach((row, i) => {

    if (i === 0) return;

    const c = row.c;

    if (!c) return;

    orders.push({
      total: parseFloat(c[3]?.v || 0),
      status: c[4]?.v || ''
    });

  });

  return orders;
}

// ===== LOAD
async function loadAll() {

  try {

    const yampi = await fetchYampi();

    const aprovados = yampi.filter(o =>
      ['Pago','Entregue','Em transporte'].includes(o.status)
    );

    const revenue = aprovados.reduce((s, o) => s + o.total, 0);

    document.getElementById('spent').innerText = 'R$ 0,00';
    document.getElementById('revenue').innerText = 'R$ ' + revenue.toFixed(2);
    document.getElementById('orders').innerText = aprovados.length;
    document.getElementById('profit').innerText = 'R$ ' + revenue.toFixed(2);
    document.getElementById('roas').innerText = '—';

  } catch (e) {

    alert('Erro ao carregar dados');
    console.log(e);

  }

}

// AUTO LOAD
loadAll();

</script>

</body>
</html>
