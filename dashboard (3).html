<script>
// CONFIG
const SHEET_ID = '1MQoxtYfNbOhF9A2TaqKHC4f-ZiEeMs_8Ob-xOd-lYMQ';

// BUSCAR YAMPI (PLANILHA)
async function fetchYampi(dateStart, dateEnd) {

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));

  const rows = json.table.rows || [];

  const start = new Date(dateStart + 'T00:00:00');
  const end   = new Date(dateEnd + 'T23:59:59');

  const orders = [];

  rows.forEach((row, i) => {

    if (i === 0) return;

    const cols = row.c;
    if (!cols) return;

    const id       = cols[0]?.v || '';
    const data     = cols[1]?.v || '';
    const cliente  = cols[2]?.v || '';
    const total    = parseFloat(cols[3]?.v || 0);
    const status   = cols[4]?.v || '';
    const utm      = cols[5]?.v || '';
    const source   = cols[6]?.v || '';

    let orderDate = new Date(data);

    if (!isNaN(orderDate) && orderDate >= start && orderDate <= end) {
      orders.push({
        id,
        cliente,
        total,
        status,
        utm_campaign: utm,
        utm_source: source
      });
    }

  });

  return orders;
}

// KPI
function renderKPIs(fbData, yampiOrders) {

  const totalSpentUSD = fbData.reduce((s, c) => s + parseFloat(c.spend || 0), 0);
  const totalSpent = totalSpentUSD * USD_TO_BRL;

  const approvedStatuses = ['Pago', 'Entregue', 'Em transporte'];

  const approvedOrders = yampiOrders.filter(o =>
    approvedStatuses.includes(o.status)
  );

  const totalRevenue = approvedOrders.reduce((s, o) => s + o.total, 0);
  const totalOrders = approvedOrders.length;

  const profit = totalRevenue - totalSpent;
  const roas = totalSpent > 0 ? totalRevenue / totalSpent : 0;

  document.getElementById('kpi-revenue').textContent = fmt(totalRevenue);
  document.getElementById('kpi-orders').textContent = fmtNum(totalOrders);
  document.getElementById('kpi-profit').textContent = fmt(profit);

  document.getElementById('roas-value').textContent =
    roas > 0 ? roas.toFixed(2) + 'x' : '—';

  return { totalRevenue, totalOrders, profit, roas };
}

// PEDIDOS
function renderOrders(orders) {

  const tbody = document.getElementById('orders-body');

  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="5">Nenhum pedido</td></tr>`;
    return;
  }

  tbody.innerHTML = orders.slice(0, 30).map(o => `
    <tr>
      <td>#${o.id}</td>
      <td>${o.cliente}</td>
      <td>${o.utm_campaign || '-'}</td>
      <td>R$ ${o.total.toFixed(2)}</td>
      <td>${o.status}</td>
    </tr>
  `).join('');
}
</script>
